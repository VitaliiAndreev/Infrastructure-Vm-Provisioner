name: CI (Docker)

# Delegates to the shared Docker CI workflow in Infrastructure-Common.
# Kept as a local file so pull_request triggers work for this repo,
# and so tag.yml can call it via workflow_call.
on:
  pull_request:
    branches: [ main, master ]
  workflow_call:
  workflow_dispatch:

jobs:
  ci-docker:
    uses: VitaliiAndreev/Infrastructure-Common/.github/workflows/ci-powershell-docker.yml@master
