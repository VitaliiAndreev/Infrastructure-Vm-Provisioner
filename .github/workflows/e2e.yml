name: E2E (PR check)

# Calls the shared E2E workflow in Infrastructure-E2E as a required PR check.
# Always runs the full lifecycle layer - a provisioner change can cascade to
# break user setup or runner registration, so the full stack must be verified.
on:
  pull_request:
    branches: [ master ]

jobs:
  e2e:
    uses: VitaliiAndreev/Infrastructure-E2E/.github/workflows/e2e.yml@master
    secrets: inherit
